name: Update CN IP List

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update-cn-ip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        
      - name: Run download script
        working-directory: cn-ip-routeros
        run: |
          chmod +x download-cn-ip.sh
          ./download-cn-ip.sh
          
      - name: Set release body
        id: set-body
        run: |
          echo "body=Updated CN IP list - $(date -u +%Y-%m-%d %H:%M:%S) UTC" >> "$GITHUB_OUTPUT"
          
      - name: Create or update release
        uses: ncipollo/release-action@v1
        with:
          name: CN IP RouterOS Script
          tag: cn-ip-routeros
          commit: main
          allowUpdates: true
          artifacts: "cn-ip-routeros/dist/cn-ip-routeros.rsc"
          artifactContentType: text/plain
          body: ${{ steps.set-body.outputs.body }}
          omitBodyDuringUpdate: true