name: Update CN IP List

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update-cn-ip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        
      - name: Run script and compare
        id: compare
        working-directory: cn-ip-routeros
        run: |
          # 运行脚本生成新文件
          chmod +x download-cn-ip.sh
          ./download-cn-ip.sh
          
          # 获取新文件MD5
          NEW_MD5=$(md5sum dist/cn-ip-routeros.rsc | cut -d' ' -f1)
          echo "新文件MD5: $NEW_MD5"
          
          # 下载旧release文件（如存在）用于比较
          mkdir -p /tmp/old_release
          gh release download cn-ip-routeros -p "*.rsc" -D /tmp/old_release --repo ${{ github.repository }} || true
          
          # 获取旧文件MD5
          if [ -f /tmp/old_release/cn-ip-routeros.rsc ]; then
            OLD_MD5=$(md5sum /tmp/old_release/cn-ip-routeros.rsc | cut -d' ' -f1)
            echo "旧文件MD5: $OLD_MD5"
          else
            OLD_MD5=""
            echo "未找到已存在的release"
          fi
          
          # 比较并输出结果
          if [ "$NEW_MD5" != "$OLD_MD5" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "IP列表已更新，正在更新release。"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "IP列表未变化，跳过release更新。"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          
      - name: Delete existing release
        if: steps.compare.outputs.changed == 'true'
        run: |
          gh release delete cn-ip-routeros -y --repo ${{ github.repository }} || true
        env:
          GH_TOKEN: ${{ github.token }}
          
      - name: Create latest release
        if: steps.compare.outputs.changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          name: CN IP RouterOS Script
          tag: cn-ip-routeros
          commit: main
          allowUpdates: false
          artifacts: "cn-ip-routeros/dist/cn-ip-routeros.rsc"
          artifactContentType: text/plain
          body: "更新CN IP列表 - $(date -u '+%Y-%m-%d %H:%M:%S') UTC"
          
      - name: Create dated release
        if: steps.compare.outputs.changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          name: CN IP RouterOS Script - $(date -u '+%Y-%m-%d %H:%M:%S') UTC
          tag: cn-ip-routeros-$(date -u +%Y%m%d-%H%M%S)
          commit: main
          allowUpdates: false
          artifacts: "cn-ip-routeros/dist/cn-ip-routeros.rsc"
          artifactContentType: text/plain
          body: "更新CN IP列表 - $(date -u '+%Y-%m-%d %H:%M:%S') UTC"