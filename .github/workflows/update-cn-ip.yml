name: 更新 CN IP 列表

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

# 防止工作流提交代码后触发自身
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  update-cn-ip:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # 必须赋予写入权限以提交代码
    
    steps:
      - name: 检出仓库
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: main
        
      - name: 运行脚本并比较
        working-directory: cn-ip-routeros
        run: |
          # 运行脚本生成新文件（脚本生成在当前目录）
          chmod +x download-cn-ip.sh
          ./download-cn-ip.sh
          
          # 为新文件生成MD5
          md5sum cn-ip-routeros.rsc > cn-ip-routeros.rsc.md5
          NEW_MD5=$(cut -d' ' -f1 cn-ip-routeros.rsc.md5)
          echo "新文件MD5: $NEW_MD5"
          
          # 获取旧文件MD5（从dist目录读取）
          OLD_MD5=$(cut -d' ' -f1 dist/cn-ip-routeros.rsc.md5 2>/dev/null || echo "")
          [ -n "$OLD_MD5" ] && echo "旧文件MD5: $OLD_MD5" || echo "未找到已存在的文件"
          
          # 比较并输出结果
          if [ "$NEW_MD5" != "$OLD_MD5" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "IP列表已更新，正在处理文件。"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "IP列表未变化，跳过提交。"
          fi
          
      - name: 移动新文件到dist并创建历史版本
        if: steps.compare.outputs.changed == 'true'
        working-directory: cn-ip-routeros
        run: |
          # 输出时间戳供后续步骤使用
          DATE_STAMP="$(date -u +%Y%m%d-%H%M%S)"
          
          # 确保dist目录存在
          mkdir -p dist
          
          # 先将新文件移动到dist目录（覆盖旧的最新版）
          mv cn-ip-routeros.rsc dist/
          mv cn-ip-routeros.rsc.md5 dist/
          echo "已将新文件移动到dist目录: cn-ip-routeros.rsc"
          
          # 再复制一份带日期的版本（历史归档）
          cp dist/cn-ip-routeros.rsc dist/cn-ip-routeros-${DATE_STAMP}.rsc
          cp dist/cn-ip-routeros.rsc.md5 dist/cn-ip-routeros-${DATE_STAMP}.rsc.md5
          echo "已创建历史版本: cn-ip-routeros-${DATE_STAMP}.rsc"
          
      - name: 清理旧版本（保留8个）
        if: steps.compare.outputs.changed == 'true'
        working-directory: cn-ip-routeros
        run: |
          # 获取所有带日期的rsc文件，按名称排序（名称中包含日期，排序即按日期排序）
          # 保留最新的8个历史版本 + 1个最新版（无日期）
          # 需要删除的是 .rsc 和 .rsc.md5 配对的文件
          
          # 列出所有历史文件（带日期戳的）
          HIST_FILES=$(ls -1 dist/cn-ip-routeros-*.rsc 2>/dev/null | sort)
          
          if [ -n "$HIST_FILES" ]; then
            # 计算文件数量
            COUNT=$(echo "$HIST_FILES" | wc -l)
            echo "当前历史文件数量: $COUNT"
            
            # 如果超过8个，删除多余的
            if [ $COUNT -gt 8 ]; then
              TO_DELETE=$(echo "$HIST_FILES" | head -n $((COUNT - 8)))
              echo "需要删除的旧文件:"
              echo "$TO_DELETE"
              
              # 删除旧的 .rsc 和对应的 .md5 文件
              for FILE in $TO_DELETE; do
                rm -f "$FILE"
                rm -f "${FILE}.md5"
                echo "已删除: $FILE 和 ${FILE}.md5"
              done
            else
              echo "历史文件数量未超过8个，无需删除"
            fi
          else
            echo "暂无历史文件"
          fi
          
      - name: 提交并推送更改
        if: steps.compare.outputs.changed == 'true'
        run: |
          # 配置 git 用户
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 添加文件（-f 强制添加被 .gitignore 忽略的文件）
          git add -f cn-ip-routeros/dist/
          
          # 提交（使用 [skip ci] 防止触发工作流）
          DATE_STAMP="${{ steps.compare.outputs.date_stamp }}"
          git commit -m "chore: update CN IP list ${DATE_STAMP} [skip ci]"
          
          # 推送到 main 分支
          git push origin main