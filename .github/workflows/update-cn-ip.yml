name: Update CN IP List

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  update-cn-ip:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        
      - name: Run script and compare
        id: compare
        working-directory: cn-ip-routeros
        run: |
          # 运行脚本生成新文件
          chmod +x download-cn-ip.sh
          ./download-cn-ip.sh
          
          # 生成MD5文件并获取值（一次计算，双重用途）
          md5sum dist/cn-ip-routeros.rsc > dist/cn-ip-routeros.rsc.md5
          NEW_MD5=$(cut -d' ' -f1 dist/cn-ip-routeros.rsc.md5)
          echo "新文件MD5: $NEW_MD5"
          
          # 下载旧release的MD5文件用于比较（比下载完整rsc文件更快）
          mkdir -p /tmp/old_release
          gh release download cn-ip-routeros -p "*.md5" -D /tmp/old_release --repo ${{ github.repository }} || true
          
          # 获取旧文件MD5
          OLD_MD5=$(cut -d' ' -f1 /tmp/old_release/cn-ip-routeros.rsc.md5 2>/dev/null || echo "")
          [ -n "$OLD_MD5" ] && echo "旧文件MD5: $OLD_MD5" || echo "未找到已存在的release"
          
          # 比较并输出结果
          if [ "$NEW_MD5" != "$OLD_MD5" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "IP列表已更新，正在更新release。"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "IP列表未变化，跳过release更新。"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          
      - name: Set release variables
        if: steps.compare.outputs.changed == 'true'
        id: release-vars
        run: |
          DATE_TAG="$(date -u +%Y%m%d-%H%M%S)"
          DATE_FULL="$(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "date_tag=$DATE_TAG" >> "$GITHUB_OUTPUT"
          echo "date_full=$DATE_FULL" >> "$GITHUB_OUTPUT"
          echo "日期标签: $DATE_TAG"
          echo "完整日期: $DATE_FULL"

      - name: Create dated release
        if: steps.compare.outputs.changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: cn-ip-routeros-${{ steps.release-vars.outputs.date_tag }}
          commit: main
          allowUpdates: false
          makeLatest: false
          artifacts: "cn-ip-routeros/dist/cn-ip-routeros.rsc,cn-ip-routeros/dist/cn-ip-routeros.rsc.md5"
          artifactContentType: text/plain
          body: "更新CN IP列表 - ${{ steps.release-vars.outputs.date_full }} UTC"
          
      - name: Update latest release
        if: steps.compare.outputs.changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          name: CN IP RouterOS Script
          tag: cn-ip-routeros
          commit: main
          allowUpdates: true
          makeLatest: true
          artifacts: "cn-ip-routeros/dist/cn-ip-routeros.rsc,cn-ip-routeros/dist/cn-ip-routeros.rsc.md5"
          artifactContentType: text/plain
          body: |
            更新CN IP列表 - ${{ steps.release-vars.outputs.date_full }} UTC

            此标签始终保持最新版本，适合用于自动更新，路径中使用标签名称cn-ip-routeros。
            因为本仓库还有其他内容，不建议使用latest作为下载路径。
            如需固定版本，请使用带日期的标签。
